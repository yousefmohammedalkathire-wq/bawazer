<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أعمالي | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- ربط خط فخم ومودرن من قوقل -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- الهيدر العلوي للبايو والاسم -->
    <header class="main-header">
        <h1 class="logo">محمد باوزير.</h1>
        <p class="bio">مصمم ديزاينر | أصنع هويات بصرية وتصاميم رقمية فريدة ومبتكرة.</p>
    </header>

    <!-- شبكة عرض الأعمال (نفس الموقع اللي عجبك بالضبط) -->
    <main class="portfolio-grid">
        
        <!-- كرت العمل الأول -->
        <div class="project-card">
            <img src="images/project1.jpg" alt="اسم التصميم">
            <div class="card-overlay">
                <h3>اسم المشروع الأول</h3>
                <p>تصميم هوية / جرافيك</p>
            </div>
        </div>

        <!-- كرت العمل الثاني -->
        <div class="project-card">
            <img src="images/project2.jpg" alt="اسم التصميم">
            <div class="card-overlay">
                <h3>اسم المشروع الثاني</h3>
                <p>تصميم سوشيال ميديا</p>
            </div>
        </div>

        <!-- كرت العمل الثالث -->
        <div class="project-card">
            <img src="images/istandmol.jpg" alt="اسم التصميم">
            <div class="card-overlay">
                <h3>اسم المشروع الثالث</h3>
                <p>تعديل صور / إبداعي</p>
            </div>
        </div>

        <!-- كرت العمل الرابع -->
        <div class="project-card">
            <img src="images/project4.jpg" alt="اسم التصميم">
            <div class="card-overlay">
                <h3>اسم المشروع الرابع</h3>
                <p>تصميم شعار</p>
            </div>
        </div>

    </main>

    <!-- تذييل الموقع لوسائل التواصل -->
    <footer class="main-footer">
        <p>هل لديك مشروع؟ دعنا نتحدث</p>
        <div class="social-links">
            <a href="https://instagram.com/username" target="_blank">إنستغرام</a>
            <a href="https://wa.me/yournumber" target="_blank">واتساب</a>
        </div>
    </footer>

    <!-- النافذة المنبثقة لعرض الصورة كاملة -->
<div id="imageModal" class="modal">
    <span class="close-btn">&times;</span>
    <img class="modal-content" id="fullImage">
</div>

<!-- ربط كود الجافاسكريبت (تأكد من إنشاء هذا الملف) -->
<script src="script.js"></script>

</body>
</html>
